<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kart Racing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ─── Screen: Main Menu ─── -->
  <div id="screen-menu" class="screen active">
    <div class="menu-bg"></div>
    <div class="menu-content">
      <div class="menu-logo">
        <span class="menu-logo-icon">&#9917;</span>
        <h1 class="menu-title">KART<br/>RACING</h1>
        <p class="menu-sub">GRAND PRIX</p>
      </div>
      <div class="menu-actions">
        <button class="menu-btn menu-btn-primary" onclick="showScreen('car-select')">START RACE</button>
        <button class="menu-btn menu-btn-secondary">CONTROLS</button>
      </div>
    </div>
  </div>

  <!-- ─── Screen: Car Select ─── -->
  <div id="screen-car-select" class="screen">
    <div class="screen-header">
      <button class="screen-back" onclick="showScreen('menu')">&#8592; BACK</button>
      <h2 class="screen-title">SELECT CAR</h2>
      <div class="screen-spacer"></div>
    </div>
    <div class="car-select-body">
      <button class="car-arrow car-arrow-left" onclick="prevCar()">&#8592;</button>
      <div class="car-display">
        <canvas id="car-preview" width="400" height="300"></canvas>
        <div class="car-name" id="car-name">Shark Racer</div>
        <div class="car-stats" id="car-stats">
          <div class="stat-row"><span>SPEED</span><div class="stat-bar"><div class="stat-fill" style="width:80%"></div></div></div>
          <div class="stat-row"><span>ACCEL</span><div class="stat-bar"><div class="stat-fill" style="width:60%"></div></div></div>
          <div class="stat-row"><span>HANDLING</span><div class="stat-bar"><div class="stat-fill" style="width:40%"></div></div></div>
          <div class="stat-row"><span>BOOST</span><div class="stat-bar"><div class="stat-fill" style="width:70%"></div></div></div>
        </div>
      </div>
      <button class="car-arrow car-arrow-right" onclick="nextCar()">&#8594;</button>
    </div>
    <div class="screen-footer">
      <button class="menu-btn menu-btn-primary" onclick="showScreen('track-select')">NEXT: TRACK</button>
    </div>
  </div>

  <!-- ─── Screen: Track Select ─── -->
  <div id="screen-track-select" class="screen">
    <div class="screen-header">
      <button class="screen-back" onclick="showScreen('car-select')">&#8592; BACK</button>
      <h2 class="screen-title">SELECT TRACK</h2>
      <div class="screen-spacer"></div>
    </div>
    <div class="track-grid" id="track-grid"></div>
    <div class="screen-footer">
      <button class="menu-btn menu-btn-primary" onclick="startRace()">RACE!</button>
    </div>
  </div>

  <!-- ─── Screen: Race ─── -->
  <div id="screen-race" class="screen">
    <canvas id="race-canvas"></canvas>

    <!-- HUD -->
    <div class="race-hud" id="race-hud">
      <div class="hud-left">
        <div class="hud-position" id="hud-pos">1st</div>
        <div class="hud-lap" id="hud-lap">LAP 1/3</div>
      </div>
      <div class="hud-center">
        <div class="hud-speed" id="hud-speed"><span class="speed-val">0</span> <span class="speed-unit">KM/H</span></div>
      </div>
      <div class="hud-right">
        <div class="hud-time" id="hud-time">00:00.0</div>
        <div class="hud-best" id="hud-best">BEST: --:--.-</div>
      </div>
    </div>

    <div class="hud-minimap" id="hud-minimap">
      <canvas id="minimap-canvas" width="100" height="100"></canvas>
    </div>

    <!-- Countdown overlay -->
    <div class="race-overlay" id="race-countdown">
      <div class="countdown-num" id="countdown-num">3</div>
    </div>

    <!-- Finish overlay -->
    <div class="race-overlay" id="race-finish">
      <div class="finish-content">
        <div class="finish-icon">&#127942;</div>
        <div class="finish-title">FINISH!</div>
        <div class="finish-pos" id="finish-pos">1st</div>
        <div class="finish-time" id="finish-time">00:00.0</div>
      </div>
    </div>
  </div>

  <!-- ─── Screen: Results ─── -->
  <div id="screen-results" class="screen">
    <div class="screen-header">
      <h2 class="screen-title">RACE RESULTS</h2>
      <div class="screen-spacer"></div>
    </div>
    <div class="results-body">
      <div class="results-podium" id="results-podium"></div>
      <div class="results-table" id="results-table"></div>
    </div>
    <div class="screen-footer">
      <button class="menu-btn menu-btn-primary" onclick="showScreen('track-select')">RACE AGAIN</button>
      <button class="menu-btn menu-btn-secondary menu-btn-spaced" onclick="showScreen('menu')">MAIN MENU</button>
    </div>
  </div>

  <script src="js/cars.js"></script>
  <script src="js/tracks.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script>initUI();</script>
</body>
</html>
